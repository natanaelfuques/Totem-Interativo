<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, initial-scale=1.0">
  <title>Totem - Fotos do Evento</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Syne', sans-serif;
      color: #fff;
    }

    #slideshow {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 1s ease-in-out;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .slide.active { opacity: 1; }
    .slide.prev { opacity: 0; }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .slide::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        transparent 50%,
        rgba(0,0,0,0.7) 100%
      );
      pointer-events: none;
    }

    /* Overlay info */
    .overlay {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 32px 48px;
      z-index: 10;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 100%);
    }

    .event-name {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      opacity: 0.9;
    }

    .cta {
      text-align: right;
    }

    .cta-qr-label {
      font-size: 13px;
      opacity: 0.6;
      margin-bottom: 4px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .cta-url {
      font-size: 18px;
      font-weight: 700;
      color: #ff3c6e;
      letter-spacing: -0.3px;
    }

    /* QR code no rodapé direito */
    .qr-wrap {
      position: fixed;
      bottom: 32px;
      right: 48px;
      z-index: 10;
      text-align: center;
    }

    .qr-wrap canvas, .qr-wrap img {
      width: 140px;
      height: 140px;
      border-radius: 12px;
      border: 4px solid #fff;
      display: block;
    }

    .qr-label {
      font-size: 11px;
      margin-top: 6px;
      opacity: 0.7;
      letter-spacing: 0.5px;
    }

    /* Empty state */
    #empty {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(255,60,110,0.15) 0%, transparent 70%);
    }

    #empty .big-icon { font-size: 80px; }

    #empty h2 {
      font-size: 42px;
      font-weight: 800;
      background: linear-gradient(135deg, #fff 30%, rgba(255,255,255,0.4));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #empty p {
      font-size: 20px;
      opacity: 0.5;
      font-weight: 400;
    }

    #empty .arrow {
      font-size: 28px;
      margin-top: 16px;
      animation: bounce 1.5s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* Progress dots */
    #dots {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 10;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transition: all 0.3s;
    }
    .dot.active {
      background: #ff3c6e;
      transform: scale(1.4);
    }

    /* New photo flash */
    #flash {
      position: fixed;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
      transition: opacity 0.1s;
    }

    #new-badge {
      position: fixed;
      top: 32px;
      left: 48px;
      background: linear-gradient(135deg, #ff3c6e, #ff8c42);
      padding: 8px 20px;
      border-radius: 99px;
      font-size: 14px;
      font-weight: 700;
      z-index: 20;
      opacity: 0;
      transform: translateY(-10px);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    #new-badge.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

<div id="slideshow"></div>
<div id="dots"></div>
<div id="flash"></div>
<div id="new-badge">📸 Nova foto!</div>

<div id="empty">
  <div class="big-icon">📸</div>
  <h2>Envie sua foto!</h2>
  <p>Escaneie o QR code e apareça aqui</p>
  <div class="arrow">↗</div>
</div>

<div class="overlay">
  <div class="event-name" id="event-name">Nome do Evento</div>
</div>

<div class="qr-wrap">
  <img id="qr-img" alt="QR Code" />
  <div class="qr-label">Envie sua foto</div>
</div>

<script>
  // =============================================
  // CONFIGURAÇÕES — edite aqui
  // =============================================
  const CONFIG = {
    eventName: 'Nome do Evento',           // Nome exibido no rodapé
    uploadUrl: window.location.origin + '/upload.html',
    slideDuration: 5000,                   // Tempo por foto (ms)
    pollInterval: 4000,                    // Intervalo de verificação de novas fotos (ms)
  };
  // =============================================

  document.getElementById('event-name').textContent = CONFIG.eventName;

  // Gera QR code via API gratuita
  document.getElementById('qr-img').src =
    `https://quickchart.io/qr?text=${encodeURIComponent(CONFIG.uploadUrl)}&size=240&margin=2`;

  let photos = [];
  let currentIndex = 0;
  let slideInterval = null;
  let lastCount = 0;

  async function fetchPhotos() {
    try {
      const res = await fetch('/api/photos');
      const data = await res.json();
      return data.photos || [];
    } catch { return []; }
  }

  function renderDots() {
    const dots = document.getElementById('dots');
    dots.innerHTML = photos.map((_, i) =>
      `<div class="dot ${i === currentIndex ? 'active' : ''}"></div>`
    ).join('');
  }

  function showSlide(index) {
    const slides = document.querySelectorAll('.slide');
    slides.forEach((s, i) => {
      s.classList.remove('active', 'prev');
      if (i === index) s.classList.add('active');
    });
    currentIndex = index;
    renderDots();
  }

  function nextSlide() {
    if (photos.length === 0) return;
    showSlide((currentIndex + 1) % photos.length);
  }

  function buildSlides() {
    const ss = document.getElementById('slideshow');
    ss.innerHTML = '';
    photos.forEach((url, i) => {
      const div = document.createElement('div');
      div.className = 'slide' + (i === currentIndex ? ' active' : '');
      const img = document.createElement('img');
      img.src = url;
      img.loading = 'lazy';
      div.appendChild(img);
      ss.appendChild(div);
    });
    renderDots();
  }

  function flashEffect() {
    const flash = document.getElementById('flash');
    flash.style.opacity = '0.6';
    setTimeout(() => flash.style.opacity = '0', 150);
  }

  function showNewBadge() {
    const badge = document.getElementById('new-badge');
    badge.classList.add('show');
    setTimeout(() => badge.classList.remove('show'), 3000);
  }

  async function poll() {
    const newPhotos = await fetchPhotos();

    if (newPhotos.length !== photos.length) {
      const hadPhotos = photos.length > 0;
      const isNew = newPhotos.length > lastCount;
      photos = newPhotos;
      lastCount = photos.length;
      buildSlides();

      if (photos.length > 0) {
        document.getElementById('empty').style.display = 'none';
        if (isNew && hadPhotos) {
          flashEffect();
          showNewBadge();
          showSlide(photos.length - 1); // pula pra foto nova
        } else {
          showSlide(currentIndex < photos.length ? currentIndex : 0);
        }
      } else {
        document.getElementById('empty').style.display = 'flex';
      }
    }
  }

  // Inicia slideshow automático
  function startSlideshow() {
    if (slideInterval) clearInterval(slideInterval);
    slideInterval = setInterval(() => {
      if (photos.length > 1) nextSlide();
    }, CONFIG.slideDuration);
  }

  // Boot
  (async () => {
    await poll();
    startSlideshow();
    setInterval(poll, CONFIG.pollInterval);
  })();
</script>
</body>
</html>
