<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📸 Envie sua foto!</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap');

    :root {
      --bg: #0a0a0f;
      --card: #13131a;
      --accent: #ff3c6e;
      --accent2: #ff8c42;
      --text: #f0f0f5;
      --muted: #6b6b80;
      --border: rgba(255,255,255,0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(255,60,110,0.18) 0%, transparent 60%),
                  radial-gradient(ellipse 60% 40% at 80% 100%, rgba(255,140,66,0.12) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 40px 32px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }

    .icon-wrap {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 24px;
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,60,110,0.4); }
      50% { box-shadow: 0 0 0 16px rgba(255,60,110,0); }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #fff 30%, rgba(255,255,255,0.5));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .upload-area {
      border: 2px dashed rgba(255,60,110,0.35);
      border-radius: 18px;
      padding: 32px 20px;
      cursor: pointer;
      transition: all 0.25s ease;
      margin-bottom: 20px;
      background: rgba(255,60,110,0.03);
      position: relative;
      overflow: hidden;
    }

    .upload-area:hover, .upload-area.dragover {
      border-color: var(--accent);
      background: rgba(255,60,110,0.08);
      transform: scale(1.01);
    }

    .upload-area input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      font-size: 0;
    }

    .upload-icon { font-size: 36px; margin-bottom: 10px; }

    .upload-label {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
    }

    .upload-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    #preview {
      display: none;
      width: 100%;
      border-radius: 14px;
      margin-bottom: 20px;
      max-height: 240px;
      object-fit: cover;
      border: 1px solid var(--border);
    }

    button {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.3px;
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(255,60,110,0.35);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      margin-top: 18px;
      font-size: 13px;
      min-height: 20px;
      color: var(--muted);
    }

    .status.success { color: #4ade80; }
    .status.error { color: var(--accent); }

    .progress {
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      margin-top: 14px;
      overflow: hidden;
      display: none;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      width: 0%;
      transition: width 0.3s ease;
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0% { filter: brightness(1); }
      50% { filter: brightness(1.3); }
      100% { filter: brightness(1); }
    }

    .success-state {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .check {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes pop {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div id="form-state">
      <div class="icon-wrap">📸</div>
      <h1>Sua foto no totem!</h1>
      <p>Escolha uma foto da galeria ou tire uma agora. Ela vai aparecer na tela do evento!</p>

      <img id="preview" alt="Preview" />

      <div class="upload-area" id="uploadArea">
        <input type="file" id="fileInput" accept="image/*" capture="environment" />
        <div class="upload-icon">🖼️</div>
        <div class="upload-label">Toque para escolher foto</div>
        <div class="upload-sub">ou usar câmera</div>
      </div>

      <button id="sendBtn" disabled onclick="uploadPhoto()">Enviar para o totem →</button>

      <div class="progress" id="progressWrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <div class="status" id="status"></div>
    </div>

    <div class="success-state" id="success-state">
      <div class="check">✓</div>
      <h1>Foto enviada!</h1>
      <p>Sua foto já está aparecendo no totem. Aproveite o evento! 🎉</p>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const sendBtn = document.getElementById('sendBtn');
    const status = document.getElementById('status');
    const progressWrap = document.getElementById('progressWrap');
    const progressBar = document.getElementById('progressBar');

    let selectedFile = null;

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      selectedFile = file;

      const reader = new FileReader();
      reader.onload = (ev) => {
        preview.src = ev.target.result;
        preview.style.display = 'block';
        document.getElementById('uploadArea').style.display = 'none';
      };
      reader.readAsDataURL(file);
      sendBtn.disabled = false;
      status.textContent = '';
    });

    async function uploadPhoto() {
      if (!selectedFile) return;
      sendBtn.disabled = true;
      status.textContent = 'Enviando...';
      progressWrap.style.display = 'block';
      progressBar.style.width = '30%';

      const formData = new FormData();
      formData.append('photo', selectedFile);

      try {
        progressBar.style.width = '70%';
        const res = await fetch('/api/upload', { method: 'POST', body: formData });
        const data = await res.json();
        progressBar.style.width = '100%';

        if (data.success) {
          setTimeout(() => {
            document.getElementById('form-state').style.display = 'none';
            const s = document.getElementById('success-state');
            s.style.display = 'flex';
          }, 300);
        } else {
          throw new Error(data.error || 'Erro ao enviar');
        }
      } catch (err) {
        progressWrap.style.display = 'none';
        status.className = 'status error';
        status.textContent = '❌ ' + err.message;
        sendBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
