<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Moderação</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap');

    :root {
      --bg: #0a0a0f;
      --card: #13131a;
      --accent: #ff3c6e;
      --green: #22c55e;
      --red: #ef4444;
      --text: #f0f0f5;
      --muted: #6b6b80;
      --border: rgba(255,255,255,0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 24px;
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 32px; }

    #login {
      max-width: 360px;
      margin: 80px auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      text-align: center;
    }

    #login h2 { font-family: 'Outfit', sans-serif; font-size: 22px; margin-bottom: 20px; }

    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 15px;
      margin-bottom: 12px;
      outline: none;
    }

    input[type="password"]:focus { border-color: var(--accent); }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary { background: var(--accent); color: #fff; width: 100%; }
    .btn-approve { background: var(--green); color: #fff; }
    .btn-reject { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
    .btn-delete { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.2); font-size: 12px; padding: 6px 12px; }
    .btn-clear { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }

    button:hover { opacity: 0.85; transform: translateY(-1px); }

    #app { display: none; max-width: 1200px; margin: 0 auto; }

    .header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .btn-clear { font-size: 13px; padding: 10px 16px; white-space: nowrap; }

    .section-title {
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge {
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 99px;
    }

    .badge.green { background: var(--green); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 40px;
    }

    .photo-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      cursor: grab;
      transition: transform 0.15s, box-shadow 0.15s;
      user-select: none;
    }

    .photo-card:active { cursor: grabbing; }
    .photo-card.dragging { opacity: 0.4; transform: scale(0.97); }
    .photo-card.drag-over { box-shadow: 0 0 0 2px var(--accent); transform: scale(1.02); }

    .photo-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
    }

    .photo-actions {
      padding: 10px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .btn-approve, .btn-reject { font-size: 13px; padding: 8px 12px; flex: 1; }

    .empty {
      color: var(--muted);
      font-size: 14px;
      padding: 24px;
      background: var(--card);
      border-radius: 12px;
      border: 1px dashed var(--border);
      text-align: center;
      margin-bottom: 48px;
    }

    .error { color: var(--accent); font-size: 13px; margin-top: 8px; }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 20px;
      margin-bottom: 32px;
    }

    .toggle-label { font-size: 15px; font-weight: 500; flex: 1; }
    .toggle-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .switch {
      position: relative;
      width: 52px;
      height: 28px;
      flex-shrink: 0;
    }

    .switch input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.1);
      border-radius: 99px;
      cursor: pointer;
      transition: 0.3s;
    }

    .slider:before {
      content: '';
      position: absolute;
      width: 22px;
      height: 22px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.3s;
    }

    input:checked + .slider { background: var(--accent); }
    input:checked + .slider:before { transform: translateX(24px); }

    .brand { display: block; text-align: center; font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.4); text-decoration: none; transition: color 0.2s; letter-spacing: 1.5px; padding: 24px 0 8px; }
    .brand:hover { color: rgba(255,255,255,0.75); }
  </style>
</head>
<body>

<div id="login">
  <h2>
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none" style="display:inline;vertical-align:middle;margin-right:6px">
      <rect x="4" y="10" width="14" height="10" rx="2" stroke="white" stroke-width="1.8"/>
      <path d="M7 10V7a4 4 0 018 0v3" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="11" cy="15" r="1.5" fill="white"/>
    </svg>
    Admin
  </h2>
  <input type="password" id="pwd" placeholder="Senha" onkeydown="if(event.key==='Enter') doLogin()" />
  <button class="btn-primary" onclick="doLogin()">Entrar</button>
  <div class="error" id="login-error"></div>
</div>

<div id="app">
  <div class="header-row">
    <div>
      <h1>Moderação de Fotos</h1>
      <div class="subtitle">Gerencie as fotos do totem</div>
    </div>
    <button class="btn-clear" onclick="clearAll()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="display:inline;vertical-align:middle;margin-right:4px">
        <path d="M2 4h10M5 4V2.5h4V4M11 4l-.7 8H3.7L3 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Limpar tudo
    </button>
  </div>

  <div class="toggle-row">
    <div>
      <div class="toggle-label">Moderação ativa</div>
      <div class="toggle-sub" id="toggle-sub">Fotos aguardam aprovação antes de aparecer no totem</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="moderation-toggle" onchange="toggleModeration()" />
      <span class="slider"></span>
    </label>
  </div>

  <div class="section-title">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.4"/>
      <path d="M7 4v3.5l2 1.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
    Aguardando aprovação
    <span class="badge" id="pending-count">0</span>
  </div>
  <div id="pending-grid" class="grid"></div>

  <div id="flagged-section" style="display:none; margin-bottom: 8px;">
    <div class="section-title">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M2 2v10M2 2l8 3-8 3" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span style="color:#ef4444">Solicitações de remoção</span>
      <span class="badge" style="background:#ef4444" id="flagged-count">0</span>
    </div>
    <div id="flagged-grid" class="grid"></div>
  </div>

  <div class="section-title">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <rect x="1.5" y="2" width="11" height="9" rx="2" stroke="currentColor" stroke-width="1.4"/>
      <path d="M1.5 11l3-3 2.5 2 3-4 2.5 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    No totem
    <span class="badge green" id="approved-count">0</span>
  </div>
  <div id="approved-grid" class="grid"></div>
  <a class="brand" href="https://instagram.com/audiodequalidade" target="_blank">@audiodequalidade</a>
</div>

<script>
  let pwd = '';

  function doLogin() {
    pwd = document.getElementById('pwd').value;
    loadPhotos();
  }

  async function loadPhotos() {
    try {
      const res = await fetch(`/api/admin?pwd=${pwd}`);
      if (res.status === 401) {
        document.getElementById('login-error').textContent = 'Senha incorreta';
        return;
      }
      const data = await res.json();
      document.getElementById('login').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      renderPending(data.pending || []);
      renderApproved(data.photos || []);
      renderFlagged(data.flagged || [], data.photos || []);
      // Atualiza toggle
      const toggle = document.getElementById('moderation-toggle');
      toggle.checked = data.moderation !== false;
      updateToggleLabel(toggle.checked);
    } catch(e) {
      document.getElementById('login-error').textContent = 'Erro ao conectar';
    }
  }

  function renderFlagged(flagged, photos) {
    const section = document.getElementById('flagged-section');
    const grid = document.getElementById('flagged-grid');
    const count = document.getElementById('flagged-count');
    // Só mostra fotos que ainda estão no totem
    const active = flagged.filter(url => photos.includes(url));
    count.textContent = active.length;
    section.style.display = active.length > 0 ? 'block' : 'none';
    grid.innerHTML = active.map(url => `
      <div class="photo-card" style="border: 2px solid #ef4444;">
        <img src="${url}" loading="lazy" />
        <div class="photo-actions">
          <button class="btn-delete" onclick="removeFlagged('${url}')">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="display:inline;vertical-align:middle;margin-right:3px"><path d="M1.5 3h9M4 3V2h4v1M9.5 3l-.6 7H3.1L2.5 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Remover
          </button>
          <button class="btn-reject" onclick="dismissFlag('${url}')">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="display:inline;vertical-align:middle;margin-right:3px"><path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
            Ignorar
          </button>
        </div>
      </div>
    `).join('');
  }

  async function removeFlagged(url) {
    await fetch(`/api/admin?pwd=${pwd}&action=delete&url=${encodeURIComponent(url)}`, { method: 'POST' });
    await fetch(`/api/admin?pwd=${pwd}&action=unflag&url=${encodeURIComponent(url)}`, { method: 'POST' });
    loadPhotos();
  }

  async function dismissFlag(url) {
    await fetch(`/api/admin?pwd=${pwd}&action=unflag&url=${encodeURIComponent(url)}`, { method: 'POST' });
    loadPhotos();
  }

  function renderPending(list) {
    document.getElementById('pending-count').textContent = list.length;
    const grid = document.getElementById('pending-grid');
    if (list.length === 0) {
      grid.innerHTML = '<div class="empty">Nenhuma foto aguardando aprovação</div>';
      return;
    }
    grid.innerHTML = list.map(url => `
      <div class="photo-card">
        <img src="${url}" loading="lazy" />
        <div class="photo-actions">
          <button class="btn-approve" onclick="approve('${url}')">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none" style="display:inline;vertical-align:middle;margin-right:3px"><path d="M2 6.5l3.5 3.5 5.5-6" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Aprovar
          </button>
          <button class="btn-reject" onclick="reject('${url}')">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none" style="display:inline;vertical-align:middle;margin-right:3px"><path d="M3 3l7 7M10 3l-7 7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
            Rejeitar
          </button>
        </div>
      </div>
    `).join('');
  }

  function renderApproved(list) {
    document.getElementById('approved-count').textContent = list.length;
    const grid = document.getElementById('approved-grid');
    if (list.length === 0) {
      grid.innerHTML = '<div class="empty">Nenhuma foto aprovada ainda</div>';
      return;
    }
    grid.innerHTML = list.map((url, i) => `
      <div class="photo-card" draggable="true" data-url="${url}" data-index="${i}">
        <img src="${url}" loading="lazy" />
        <div class="photo-actions">
          <button class="btn-delete" onclick="deletePhoto('${url}')">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="display:inline;vertical-align:middle;margin-right:3px"><path d="M1.5 3h9M4 3V2h4v1M9.5 3l-.6 7H3.1L2.5 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Remover
          </button>
        </div>
      </div>
    `).join('');

    // Drag and drop
    let dragSrc = null;
    grid.querySelectorAll('.photo-card').forEach(card => {
      card.addEventListener('dragstart', () => { dragSrc = card; card.classList.add('dragging'); });
      card.addEventListener('dragend', () => card.classList.remove('dragging'));
      card.addEventListener('dragover', e => { e.preventDefault(); card.classList.add('drag-over'); });
      card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
      card.addEventListener('drop', async e => {
        e.preventDefault();
        card.classList.remove('drag-over');
        if (dragSrc === card) return;
        const cards = [...grid.querySelectorAll('.photo-card')];
        const from = cards.indexOf(dragSrc);
        const to = cards.indexOf(card);
        cards.splice(from, 1);
        cards.splice(to, 0, dragSrc);
        cards.forEach(c => grid.appendChild(c));
        const newOrder = [...grid.querySelectorAll('.photo-card')].map(c => c.dataset.url);
        await fetch(`/api/admin?pwd=${pwd}&action=reorder`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ photos: newOrder })
        });
      });
    });
  }

  async function approve(url) {
    await fetch(`/api/admin?pwd=${pwd}&action=approve&url=${encodeURIComponent(url)}`, { method: 'POST' });
    loadPhotos();
  }

  async function reject(url) {
    await fetch(`/api/admin?pwd=${pwd}&action=reject&url=${encodeURIComponent(url)}`, { method: 'POST' });
    loadPhotos();
  }

  async function deletePhoto(url) {
    await fetch(`/api/admin?pwd=${pwd}&action=delete&url=${encodeURIComponent(url)}`, { method: 'POST' });
    loadPhotos();
  }

  async function clearAll() {
    if (!confirm('Apagar todas as fotos e pendentes?')) return;
    await fetch(`/api/admin?pwd=${pwd}&action=clear`, { method: 'POST' });
    loadPhotos();
  }

  async function toggleModeration() {
    const toggle = document.getElementById('moderation-toggle');
    const val = toggle.checked ? '1' : '0';
    await fetch(`/api/admin?pwd=${pwd}&action=moderation&value=${val}`, { method: 'POST' });
    updateToggleLabel(toggle.checked);
  }

  function updateToggleLabel(active) {
    document.getElementById('toggle-sub').textContent = active
      ? 'Fotos aguardam aprovação antes de aparecer no totem'
      : 'Fotos aparecem no totem automaticamente';
  }

  // Auto-refresh a cada 10s
  setInterval(() => {
    if (document.getElementById('app').style.display !== 'none') loadPhotos();
  }, 10000);
</script>
</body>
</html>
